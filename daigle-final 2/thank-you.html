<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Daigle Jewelry</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230f0a06'/><text y='72' x='50' text-anchor='middle' font-family='Georgia,serif' font-size='60' fill='%23d4c3a3'>D</text></svg>" />
  <style>
    :root {
      --espresso: #0f0a06;
      --gold:     #d4c3a3;
      --white:    #f8f4ef;
      --muted:    rgba(248,244,239,0.4);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--espresso);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      letter-spacing: 0.6em;
      text-transform: uppercase;
      color: var(--white);
      text-decoration: none;
      margin-bottom: 64px;
      display: block;
    }
    .rule {
      width: 40px;
      height: 1px;
      background: var(--gold);
      margin: 0 auto 40px;
      opacity: 0.5;
    }
    .eyebrow {
      font-size: 0.5rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 24px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 300;
      line-height: 1;
      margin-bottom: 24px;
    }
    h1 em {
      font-style: italic;
      color: var(--gold);
    }
    p {
      font-size: 0.7rem;
      color: var(--muted);
      line-height: 2;
      max-width: 420px;
      margin: 0 auto 48px;
      letter-spacing: 0.05em;
    }
    .btn {
      font-size: 0.55rem;
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-block;
      padding: 0.9rem 2.4rem;
      background: transparent;
      color: var(--gold);
      border: 1px solid rgba(212,195,163,0.3);
      transition: all 0.4s ease;
    }
    .btn:hover {
      background: var(--gold);
      color: var(--espresso);
      border-color: var(--gold);
    }
    .footer-note {
      position: fixed;
      bottom: 2rem;
      font-size: 0.45rem;
      color: rgba(248,244,239,0.15);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <a href="/" class="logo">Daigle</a>
  <div class="eyebrow">Commission Received</div>
  <div class="rule"></div>
  <h1>Thank <em>You.</em></h1>
  <p>
    Your inquiry has been received. Doren will personally review your vision and respond within 48 hours. We look forward to beginning something extraordinary with you.
  </p>
  <a href="/" class="btn">Return to Daigle</a>
  <p class="footer-note">Daigle Jewelry &nbsp;&mdash;&nbsp; Baton Rouge, Louisiana</p>
</body>
</html>
